name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  gates:
    # Same rust gates as ci.yml — a tag can only publish what passes them.
    name: gates (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (warnings = errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
  build-wheels:
    name: wheels (${{ matrix.os }}-${{ matrix.target }})
    needs: gates
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: ubuntu-latest, target: aarch64 }
          - { os: macos-latest,  target: aarch64 }
          - { os: macos-latest,  target: x86_64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist
  publish:
    name: publish to PyPI (trusted publishing)
    needs: [gates, build-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: wheels-*, merge-multiple: true, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
