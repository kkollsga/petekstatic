[workspace]
resolver = "2"
members = [
    "crates/petekstatic-error",
    "crates/srs-grid",
    "crates/srs-gridder",
    "crates/srs-petro",
    "crates/srs-wireframe",
    "crates/srs-data",
    "crates/srs-volumetrics",
    "crates/srs-uncertainty",
    "crates/srs-spill",
    "crates/srs-model",
    "crates/petekstatic-py",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
# BSL-1.1 declared via its SPDX identifier (BUSL-1.1). The full text ships as the
# repo-root LICENSE; the SPDX id is what crates.io / PyPI surface. (A workspace-
# root `license-file` does not package into the individual member crates, so the
# machine-readable SPDX id is the correct, portable declaration here.)
license = "BUSL-1.1"
repository = "https://github.com/kkollsga/petekstatic"
rust-version = "1.80"

[workspace.dependencies]
# INTERNAL workspace crates: `{ path, version }` â€” path drives LOCAL builds, the
# version pin is what cargo writes into the published manifest (the crates are
# published together, in dependency order). No `[patch]` needed for these.
# petekStatic's single error type (house-style Â§1), the analog of petekSim's SrsError.
petekstatic-error = { path = "crates/petekstatic-error", version = "0.1.0" }
srs-grid = { path = "crates/srs-grid", version = "0.1.0" }
srs-gridder = { path = "crates/srs-gridder", version = "0.1.0" }
srs-petro = { path = "crates/srs-petro", version = "0.1.0" }
srs-wireframe = { path = "crates/srs-wireframe", version = "0.1.0" }
# srs-data: the petekioâ†’wireframe ingest adapter (carries petekio's neutral
# Distribution DTO; the DTOâ†’sampler mapping lives downstream in petekSim/srs-core).
srs-data = { path = "crates/srs-data", version = "0.1.0" }
# srs-volumetrics + srs-uncertainty: relocated from petekSim 2026-07-03 (last
# petekSim SHA fe6343c) per graph `decision_layer_charters` â€” GRV/in-place +
# Monte Carlo over static-model realizations now live in the GEOMODEL layer.
srs-volumetrics = { path = "crates/srs-volumetrics", version = "0.1.0" }
srs-uncertainty = { path = "crates/srs-uncertainty", version = "0.1.0" }
# srs-spill: the out-of-core backing-storage mode (memory budget + k-slab spill),
# extracted from srs-model 2026-07-05 (organize wave P10). A leaf crate below the
# model aggregate â€” srs-model re-exports its surface so the public path is unchanged.
srs-spill = { path = "crates/srs-spill", version = "0.1.0" }
# srs-model: the top of the DAG â€” the StaticModel aggregate + the ratified
# MC-regeneration seam (StaticModelTemplate / RealizationDraw / builder).
srs-model = { path = "crates/srs-model", version = "0.1.0" }
# CROSS-REPO family deps: resolved from crates.io (the family is published; the
# dev-only [patch.crates-io] was removed at launch).
# petekTools (pure-leaf toolkit, downstream DAG edge): gridding kernels
# (ConvergentGridder / warm-start), units, and the pproj container.
petektools = "0.2.0"
# petekio (DATA layer): the upstream input-data crate. Its `GeoError` composes
# into `StaticError` via `#[from]` so `?` chains DATAâ†’GEOMODEL at the seam.
petekio = "0.3.0"
thiserror = "2"
# Config-layer serde (task_petekstatic_spec_mirror, testing doctrine R7): the
# declarative build/MC config values (HorizonStack family, BuildSpec, McSettings,
# draws, â€¦) round-trip as scenario files; the derives live on the value types
# across the config crates (srs-wireframe / srs-gridder / srs-volumetrics / srs-model).
serde = { version = "1", features = ["derive"] }

# Warnings are errors (CLAUDE.md gate). Applied per-crate via `[lints] workspace = true`.
[workspace.lints.rust]
unused = { level = "deny", priority = -1 }
dead_code = "deny"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }

[profile.release]
lto = true
codegen-units = 1
